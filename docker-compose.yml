services:
  craner-data-inspector:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
      USER_DB_PATH: /app/data/users.json
    volumes:
      - craner_user_data:/app/data
      - craner_export_tmp:/app/server/tmp
    restart: unless-stopped

volumes:
  craner_user_data:
  craner_export_tmp:
